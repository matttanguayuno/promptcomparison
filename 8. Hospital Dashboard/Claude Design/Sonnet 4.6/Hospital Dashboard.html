<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MedCore Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body, #root { height: 100%; overflow: hidden; }
  body { font-family: 'DM Sans', sans-serif; background: #0d1117; }

  :root {
    --navy: #0d1117;
    --sidebar: #111827;
    --sidebar-hover: #1a2236;
    --panel: #ffffff;
    --panel-alt: #f8fafc;
    --border: #e2e8f0;
    --border-dark: #1e293b;
    --text-primary: #0f172a;
    --text-secondary: #64748b;
    --text-muted: #94a3b8;
    --teal: oklch(0.68 0.14 195);
    --teal-light: oklch(0.94 0.06 195);
    --teal-dark: oklch(0.50 0.14 195);
    --amber: oklch(0.75 0.16 68);
    --amber-light: oklch(0.96 0.06 68);
    --rose: oklch(0.62 0.20 15);
    --rose-light: oklch(0.96 0.06 15);
    --green: oklch(0.65 0.16 148);
    --green-light: oklch(0.95 0.06 148);
    --purple: oklch(0.62 0.18 290);
    --purple-light: oklch(0.95 0.07 290);
  }

  scrollbar-width: thin;
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
  @keyframes slideIn { from { opacity: 0; transform: translateX(12px); } to { opacity: 1; transform: none; } }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "theme": "light",
  "density": "comfortable",
  "accentColor": "teal",
  "showAlerts": true
}/*EDITMODE-END*/;

// ─── DATA ───────────────────────────────────────────────────────────────────
const PATIENTS = [
  { id: 1, name: "Margaret Chen", age: 67, room: "4A-12", ward: "Cardiology", status: "critical", condition: "Acute MI", admitted: "Apr 20", vitals: { hr: 112, bp: "90/60", spo2: 91, temp: 38.9 }, doctor: "Dr. Patel", alerts: ["Low SpO₂", "Tachycardia"], flag: true },
  { id: 2, name: "James Okafor", age: 52, room: "3B-07", ward: "Neurology", status: "stable", condition: "Ischemic Stroke", admitted: "Apr 18", vitals: { hr: 74, bp: "128/82", spo2: 98, temp: 36.8 }, doctor: "Dr. Kim", alerts: [], flag: false },
  { id: 3, name: "Sofia Reyes", age: 34, room: "2C-03", ward: "Orthopedics", status: "stable", condition: "Post-op Knee", admitted: "Apr 21", vitals: { hr: 68, bp: "118/76", spo2: 99, temp: 37.1 }, doctor: "Dr. Nguyen", alerts: [], flag: false },
  { id: 4, name: "Robert Hale", age: 78, room: "5A-01", ward: "Pulmonology", status: "warning", condition: "COPD Exacerbation", admitted: "Apr 19", vitals: { hr: 88, bp: "145/92", spo2: 94, temp: 37.6 }, doctor: "Dr. Patel", alerts: ["SpO₂ borderline"], flag: true },
  { id: 5, name: "Aisha Osman", age: 29, room: "1D-14", ward: "Oncology", status: "stable", condition: "Chemo Cycle 3", admitted: "Apr 22", vitals: { hr: 72, bp: "110/70", spo2: 98, temp: 36.6 }, doctor: "Dr. Shah", alerts: [], flag: false },
  { id: 6, name: "David Thornton", age: 61, room: "4B-09", ward: "Cardiology", status: "warning", condition: "CHF", admitted: "Apr 17", vitals: { hr: 96, bp: "155/98", spo2: 96, temp: 37.2 }, doctor: "Dr. Kim", alerts: ["Hypertension"], flag: false },
  { id: 7, name: "Priya Sharma", age: 45, room: "2A-11", ward: "Endocrinology", status: "stable", condition: "DKA — resolving", admitted: "Apr 20", vitals: { hr: 76, bp: "122/80", spo2: 99, temp: 36.9 }, doctor: "Dr. Nguyen", alerts: [], flag: false },
  { id: 8, name: "Leo Müller", age: 55, room: "3C-06", ward: "Gastroenterology", status: "critical", condition: "GI Bleed", admitted: "Apr 22", vitals: { hr: 118, bp: "88/55", spo2: 93, temp: 38.4 }, doctor: "Dr. Shah", alerts: ["Hemodynamic instability", "Low SpO₂"], flag: true },
];

const STATS = [
  { label: "Total Patients", value: 247, sub: "+12 today", icon: "👤", color: "teal" },
  { label: "Critical", value: 8, sub: "Needs attention", icon: "⚠", color: "rose" },
  { label: "Avg. LOS", value: "4.2d", sub: "−0.3 vs last wk", icon: "📅", color: "purple" },
  { label: "Bed Occupancy", value: "84%", sub: "312 / 370 beds", icon: "🛏", color: "amber" },
  { label: "Discharges Today", value: 19, sub: "6 pending", icon: "✓", color: "green" },
];

const NAV_ITEMS = [
  { id: "dashboard", label: "Dashboard", icon: GridIcon },
  { id: "patients", label: "Patients", icon: UsersIcon },
  { id: "schedule", label: "Schedule", icon: CalIcon },
  { id: "labs", label: "Lab Results", icon: FlaskIcon },
  { id: "pharmacy", label: "Pharmacy", icon: PillIcon },
  { id: "reports", label: "Reports", icon: ChartIcon },
];

const QUICK_ACTIONS = [
  { label: "Order Lab", icon: "🧪", color: "teal" },
  { label: "Prescribe Rx", icon: "💊", color: "purple" },
  { label: "Schedule Consult", icon: "📋", color: "amber" },
  { label: "Discharge Note", icon: "📄", color: "green" },
  { label: "Request Imaging", icon: "🩻", color: "rose" },
  { label: "Emergency Alert", icon: "🚨", color: "rose" },
];

const ALERTS = [
  { id: 1, text: "Margaret Chen — SpO₂ critically low (91%)", time: "2m ago", level: "critical", patient: 1 },
  { id: 2, text: "Leo Müller — BP dropping (88/55 mmHg)", time: "8m ago", level: "critical", patient: 8 },
  { id: 3, text: "Robert Hale — SpO₂ borderline (94%)", time: "15m ago", level: "warning", patient: 4 },
  { id: 4, text: "David Thornton — BP elevated (155/98)", time: "32m ago", level: "warning", patient: 6 },
];

// ─── ICONS ───────────────────────────────────────────────────────────────────
function GridIcon() {
  return <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="1" y="1" width="6" height="6" rx="1.5" fill="currentColor" opacity=".9"/><rect x="9" y="1" width="6" height="6" rx="1.5" fill="currentColor" opacity=".9"/><rect x="1" y="9" width="6" height="6" rx="1.5" fill="currentColor" opacity=".9"/><rect x="9" y="9" width="6" height="6" rx="1.5" fill="currentColor" opacity=".9"/></svg>;
}
function UsersIcon() {
  return <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="6" cy="5" r="2.5" stroke="currentColor" strokeWidth="1.5"/><path d="M1 13c0-2.8 2.2-5 5-5s5 2.2 5 5" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"/><path d="M11 7c1.4.3 2.5 1.6 2.5 3.2" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"/><circle cx="12" cy="4" r="1.5" stroke="currentColor" strokeWidth="1.4"/></svg>;
}
function CalIcon() {
  return <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="2" y="3" width="12" height="11" rx="2" stroke="currentColor" strokeWidth="1.5"/><path d="M5 1v3M11 1v3M2 7h12" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"/></svg>;
}
function FlaskIcon() {
  return <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M6 1v6L2 13h12L10 7V1" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/><path d="M5 1h6" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"/></svg>;
}
function PillIcon() {
  return <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="2" y="6" width="12" height="4" rx="2" stroke="currentColor" strokeWidth="1.5"/><line x1="8" y1="6" x2="8" y2="10" stroke="currentColor" strokeWidth="1.5"/></svg>;
}
function ChartIcon() {
  return <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M2 12l3-4 3 2 3-5 3 3" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>;
}

// ─── STATUS BADGE ────────────────────────────────────────────────────────────
function StatusBadge({ status }) {
  const map = { critical: ["var(--rose)", "var(--rose-light)", "Critical"], warning: ["var(--amber)", "var(--amber-light)", "Warning"], stable: ["var(--green)", "var(--green-light)", "Stable"] };
  const [color, bg, label] = map[status] || map.stable;
  return (
    <span style={{ display: "inline-flex", alignItems: "center", gap: 5, padding: "3px 9px", borderRadius: 20, background: bg, color, fontSize: 11, fontWeight: 600, letterSpacing: "0.02em" }}>
      {status === "critical" && <span style={{ width: 6, height: 6, borderRadius: "50%", background: color, animation: "pulse 1.5s infinite" }} />}
      {label}
    </span>
  );
}

// ─── VITALS MINI ─────────────────────────────────────────────────────────────
function VitalChip({ label, value, warn }) {
  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 1 }}>
      <span style={{ fontSize: 9, fontFamily: "'DM Mono',monospace", textTransform: "uppercase", letterSpacing: "0.08em", color: "var(--text-muted)" }}>{label}</span>
      <span style={{ fontSize: 13, fontFamily: "'DM Mono',monospace", fontWeight: 500, color: warn ? "var(--rose)" : "var(--text-primary)" }}>{value}</span>
    </div>
  );
}

// ─── PATIENT CARD ────────────────────────────────────────────────────────────
function PatientCard({ patient, selected, onClick, tweaks }) {
  const isActive = selected;
  return (
    <div onClick={onClick} style={{
      background: isActive ? (tweaks.theme === "dark" ? "#1e293b" : "white") : (tweaks.theme === "dark" ? "#111827" : "white"),
      border: isActive ? `1.5px solid var(--teal)` : `1px solid ${tweaks.theme === "dark" ? "#1e293b" : "var(--border)"}`,
      borderRadius: 12,
      padding: tweaks.density === "compact" ? "12px 14px" : "16px 18px",
      cursor: "pointer",
      transition: "all 0.15s ease",
      boxShadow: isActive ? "0 0 0 3px oklch(0.68 0.14 195 / 0.12)" : "none",
      animation: "fadeIn 0.3s ease both",
      position: "relative",
      overflow: "hidden",
    }}
    onMouseEnter={e => { if (!isActive) e.currentTarget.style.boxShadow = "0 2px 12px rgba(0,0,0,0.06)"; }}
    onMouseLeave={e => { if (!isActive) e.currentTarget.style.boxShadow = "none"; }}
    >
      {patient.status === "critical" && <div style={{ position: "absolute", top: 0, left: 0, right: 0, height: 2, background: "var(--rose)" }} />}
      {patient.status === "warning" && <div style={{ position: "absolute", top: 0, left: 0, right: 0, height: 2, background: "var(--amber)" }} />}

      <div style={{ display: "flex", alignItems: "flex-start", justifyContent: "space-between", marginBottom: 10 }}>
        <div style={{ display: "flex", gap: 10, alignItems: "center" }}>
          <div style={{
            width: 36, height: 36, borderRadius: 10, background: `linear-gradient(135deg, oklch(0.68 0.14 ${195 + patient.id * 22}) 0%, oklch(0.58 0.14 ${195 + patient.id * 22}) 100%)`,
            display: "flex", alignItems: "center", justifyContent: "center", color: "white", fontWeight: 700, fontSize: 13, flexShrink: 0,
          }}>
            {patient.name.split(" ").map(n => n[0]).join("")}
          </div>
          <div>
            <div style={{ fontWeight: 600, fontSize: 14, color: tweaks.theme === "dark" ? "#f1f5f9" : "var(--text-primary)", lineHeight: 1.2 }}>{patient.name}</div>
            <div style={{ fontSize: 11, color: "var(--text-muted)", marginTop: 2 }}>Age {patient.age} · Room {patient.room}</div>
          </div>
        </div>
        <StatusBadge status={patient.status} />
      </div>

      <div style={{ fontSize: 12, color: tweaks.theme === "dark" ? "#94a3b8" : "var(--text-secondary)", marginBottom: 10, fontWeight: 500 }}>
        {patient.condition}
      </div>

      <div style={{ display: "flex", gap: 16, flexWrap: "wrap", paddingTop: 10, borderTop: `1px solid ${tweaks.theme === "dark" ? "#1e293b" : "var(--border)"}` }}>
        <VitalChip label="HR" value={`${patient.vitals.hr}`} warn={patient.vitals.hr > 100} />
        <VitalChip label="BP" value={patient.vitals.bp} warn={parseInt(patient.vitals.bp) > 140} />
        <VitalChip label="SpO₂" value={`${patient.vitals.spo2}%`} warn={patient.vitals.spo2 < 95} />
        <VitalChip label="Temp" value={`${patient.vitals.temp}°C`} warn={patient.vitals.temp > 38.0} />
        <div style={{ marginLeft: "auto", fontSize: 11, color: "var(--text-muted)", alignSelf: "flex-end" }}>Adm. {patient.admitted}</div>
      </div>

      {patient.alerts.length > 0 && (
        <div style={{ marginTop: 8, display: "flex", gap: 4, flexWrap: "wrap" }}>
          {patient.alerts.map(a => (
            <span key={a} style={{ fontSize: 10, padding: "2px 7px", borderRadius: 4, background: patient.status === "critical" ? "var(--rose-light)" : "var(--amber-light)", color: patient.status === "critical" ? "var(--rose)" : "var(--amber)", fontWeight: 600 }}>{a}</span>
          ))}
        </div>
      )}
    </div>
  );
}

// ─── DETAIL PANEL ────────────────────────────────────────────────────────────
function DetailPanel({ patient, onClose, tweaks }) {
  if (!patient) return null;
  const bg = tweaks.theme === "dark" ? "#111827" : "white";
  const border = tweaks.theme === "dark" ? "#1e293b" : "var(--border)";
  const textPrimary = tweaks.theme === "dark" ? "#f1f5f9" : "var(--text-primary)";
  const textSec = tweaks.theme === "dark" ? "#94a3b8" : "var(--text-secondary)";

  return (
    <div style={{ background: bg, borderLeft: `1px solid ${border}`, width: 300, flexShrink: 0, display: "flex", flexDirection: "column", animation: "slideIn 0.2s ease", overflow: "hidden" }}>
      <div style={{ padding: "16px 20px", borderBottom: `1px solid ${border}`, display: "flex", alignItems: "center", justifyContent: "space-between" }}>
        <span style={{ fontWeight: 700, fontSize: 13, color: textPrimary }}>Patient Detail</span>
        <button onClick={onClose} style={{ background: "none", border: "none", cursor: "pointer", color: textSec, fontSize: 18, lineHeight: 1 }}>×</button>
      </div>

      <div style={{ padding: "20px", overflowY: "auto", flex: 1 }}>
        {/* Header */}
        <div style={{ textAlign: "center", marginBottom: 20 }}>
          <div style={{ width: 56, height: 56, borderRadius: 16, background: `linear-gradient(135deg, oklch(0.68 0.14 ${195 + patient.id * 22}) 0%, oklch(0.58 0.14 ${195 + patient.id * 22}) 100%)`, display: "flex", alignItems: "center", justifyContent: "center", color: "white", fontWeight: 700, fontSize: 20, margin: "0 auto 10px" }}>
            {patient.name.split(" ").map(n => n[0]).join("")}
          </div>
          <div style={{ fontWeight: 700, fontSize: 16, color: textPrimary }}>{patient.name}</div>
          <div style={{ fontSize: 12, color: textSec, marginTop: 2 }}>Age {patient.age} · {patient.ward}</div>
          <div style={{ marginTop: 8 }}><StatusBadge status={patient.status} /></div>
        </div>

        {/* Info rows */}
        {[["Room", patient.room], ["Condition", patient.condition], ["Admitted", patient.admitted], ["Physician", patient.doctor]].map(([k, v]) => (
          <div key={k} style={{ display: "flex", justifyContent: "space-between", padding: "8px 0", borderBottom: `1px solid ${border}`, fontSize: 13 }}>
            <span style={{ color: textSec }}>{k}</span>
            <span style={{ fontWeight: 600, color: textPrimary }}>{v}</span>
          </div>
        ))}

        {/* Vitals */}
        <div style={{ marginTop: 16, marginBottom: 8, fontSize: 11, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.08em", color: textSec }}>Vitals</div>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
          {[["Heart Rate", `${patient.vitals.hr} bpm`, patient.vitals.hr > 100], ["Blood Pressure", `${patient.vitals.bp} mmHg`, parseInt(patient.vitals.bp) > 140], ["SpO₂", `${patient.vitals.spo2}%`, patient.vitals.spo2 < 95], ["Temperature", `${patient.vitals.temp}°C`, patient.vitals.temp > 38.0]].map(([k, v, warn]) => (
            <div key={k} style={{ background: warn ? (patient.status === "critical" ? "var(--rose-light)" : "var(--amber-light)") : (tweaks.theme === "dark" ? "#1e293b" : "var(--panel-alt)"), borderRadius: 8, padding: "10px 12px" }}>
              <div style={{ fontSize: 10, textTransform: "uppercase", letterSpacing: "0.06em", color: warn ? (patient.status === "critical" ? "var(--rose)" : "var(--amber)") : textSec, marginBottom: 4 }}>{k}</div>
              <div style={{ fontFamily: "'DM Mono',monospace", fontSize: 16, fontWeight: 600, color: warn ? (patient.status === "critical" ? "var(--rose)" : "var(--amber)") : textPrimary }}>{v}</div>
            </div>
          ))}
        </div>

        {/* Alerts */}
        {patient.alerts.length > 0 && (
          <>
            <div style={{ marginTop: 16, marginBottom: 8, fontSize: 11, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.08em", color: textSec }}>Active Alerts</div>
            {patient.alerts.map(a => (
              <div key={a} style={{ display: "flex", alignItems: "center", gap: 8, padding: "8px 10px", borderRadius: 8, background: patient.status === "critical" ? "var(--rose-light)" : "var(--amber-light)", marginBottom: 6, fontSize: 12, color: patient.status === "critical" ? "var(--rose)" : "var(--amber)", fontWeight: 500 }}>
                <span>⚠</span>{a}
              </div>
            ))}
          </>
        )}

        {/* Actions */}
        <div style={{ marginTop: 16 }}>
          <div style={{ marginBottom: 8, fontSize: 11, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.08em", color: textSec }}>Quick Actions</div>
          {["View Full Chart", "Add Note", "Order Test", "Schedule Follow-up"].map(a => (
            <button key={a} style={{ width: "100%", padding: "9px 12px", marginBottom: 6, background: "none", border: `1px solid ${border}`, borderRadius: 8, cursor: "pointer", fontSize: 13, fontFamily: "'DM Sans',sans-serif", color: textPrimary, textAlign: "left", transition: "all 0.12s" }}
              onMouseEnter={e => { e.currentTarget.style.background = tweaks.theme === "dark" ? "#1e293b" : "var(--teal-light)"; e.currentTarget.style.borderColor = "var(--teal)"; }}
              onMouseLeave={e => { e.currentTarget.style.background = "none"; e.currentTarget.style.borderColor = border; }}>
              {a}
            </button>
          ))}
        </div>
      </div>
    </div>
  );
}

// ─── MAIN APP ────────────────────────────────────────────────────────────────
function App() {
  const [tweaks, setTweaks] = useState(TWEAK_DEFAULTS);
  const [tweaksOpen, setTweaksOpen] = useState(false);
  const [activeNav, setActiveNav] = useState("dashboard");
  const [selectedPatient, setSelectedPatient] = useState(null);
  const [filter, setFilter] = useState("all");
  const [search, setSearch] = useState("");
  const [dismissedAlerts, setDismissedAlerts] = useState([]);
  const [actionFeedback, setActionFeedback] = useState(null);

  // Tweaks panel comms
  useEffect(() => {
    const handler = (e) => {
      if (e.data?.type === "__activate_edit_mode") setTweaksOpen(true);
      if (e.data?.type === "__deactivate_edit_mode") setTweaksOpen(false);
    };
    window.addEventListener("message", handler);
    window.parent.postMessage({ type: "__edit_mode_available" }, "*");
    return () => window.removeEventListener("message", handler);
  }, []);

  const updateTweak = (key, val) => {
    const next = { ...tweaks, [key]: val };
    setTweaks(next);
    window.parent.postMessage({ type: "__edit_mode_set_keys", edits: { [key]: val } }, "*");
  };

  const isDark = tweaks.theme === "dark";
  const bg = isDark ? "#0d1117" : "#f1f5f9";
  const sidebarBg = isDark ? "#070c14" : "#0f172a";
  const panelBg = isDark ? "#111827" : "white";
  const border = isDark ? "#1e293b" : "#e2e8f0";
  const textPrimary = isDark ? "#f1f5f9" : "#0f172a";
  const textSec = isDark ? "#94a3b8" : "#64748b";

  const filteredPatients = PATIENTS.filter(p => {
    const matchFilter = filter === "all" || p.status === filter || p.ward.toLowerCase() === filter;
    const matchSearch = !search || p.name.toLowerCase().includes(search.toLowerCase()) || p.room.toLowerCase().includes(search.toLowerCase()) || p.condition.toLowerCase().includes(search.toLowerCase());
    return matchFilter && matchSearch;
  });

  const visibleAlerts = tweaks.showAlerts ? ALERTS.filter(a => !dismissedAlerts.includes(a.id)) : [];

  const triggerAction = (label) => {
    setActionFeedback(label);
    setTimeout(() => setActionFeedback(null), 2000);
  };

  return (
    <div style={{ display: "flex", height: "100vh", background: bg, fontFamily: "'DM Sans',sans-serif", overflow: "hidden", position: "relative" }}>

      {/* ── SIDEBAR ── */}
      <aside style={{ width: 220, background: sidebarBg, display: "flex", flexDirection: "column", flexShrink: 0, borderRight: `1px solid rgba(255,255,255,0.04)` }}>
        {/* Logo */}
        <div style={{ padding: "20px 20px 16px", borderBottom: "1px solid rgba(255,255,255,0.06)" }}>
          <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
            <div style={{ width: 32, height: 32, borderRadius: 9, background: "var(--teal)", display: "flex", alignItems: "center", justifyContent: "center" }}>
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 2v12M2 8h12" stroke="white" strokeWidth="2.5" strokeLinecap="round"/></svg>
            </div>
            <div>
              <div style={{ fontWeight: 800, fontSize: 15, color: "white", letterSpacing: "-0.01em" }}>MedCore</div>
              <div style={{ fontSize: 10, color: "#4b6280", fontWeight: 500 }}>Clinical Suite</div>
            </div>
          </div>
        </div>

        {/* Nav */}
        <nav style={{ flex: 1, padding: "12px 10px", overflowY: "auto" }}>
          <div style={{ fontSize: 9, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.1em", color: "#3d5470", padding: "0 10px 8px" }}>Navigation</div>
          {NAV_ITEMS.map(({ id, label, icon: Icon }) => {
            const active = activeNav === id;
            return (
              <button key={id} onClick={() => setActiveNav(id)} style={{
                display: "flex", alignItems: "center", gap: 10, width: "100%", padding: "9px 12px", borderRadius: 8, border: "none", cursor: "pointer", marginBottom: 2,
                background: active ? "rgba(255,255,255,0.08)" : "transparent",
                color: active ? "white" : "#4b6280",
                fontSize: 13, fontFamily: "'DM Sans',sans-serif", fontWeight: active ? 600 : 400,
                transition: "all 0.12s",
              }}
              onMouseEnter={e => { if (!active) { e.currentTarget.style.background = "rgba(255,255,255,0.04)"; e.currentTarget.style.color = "#94a3b8"; } }}
              onMouseLeave={e => { if (!active) { e.currentTarget.style.background = "transparent"; e.currentTarget.style.color = "#4b6280"; } }}>
                {active && <div style={{ position: "absolute", left: 10, width: 3, height: 20, borderRadius: 2, background: "var(--teal)" }} />}
                <Icon /> {label}
                {id === "patients" && <span style={{ marginLeft: "auto", background: "var(--teal)", color: "white", fontSize: 10, fontWeight: 700, padding: "1px 6px", borderRadius: 10 }}>247</span>}
              </button>
            );
          })}
        </nav>

        {/* User */}
        <div style={{ padding: "12px 16px", borderTop: "1px solid rgba(255,255,255,0.06)", display: "flex", alignItems: "center", gap: 10 }}>
          <div style={{ width: 32, height: 32, borderRadius: 10, background: "linear-gradient(135deg, oklch(0.68 0.14 280), oklch(0.58 0.14 310))", display: "flex", alignItems: "center", justifyContent: "center", color: "white", fontWeight: 700, fontSize: 12 }}>SR</div>
          <div>
            <div style={{ fontSize: 12, fontWeight: 600, color: "#cbd5e1" }}>Dr. S. Ramos</div>
            <div style={{ fontSize: 10, color: "#4b6280" }}>Attending</div>
          </div>
          <div style={{ marginLeft: "auto", width: 8, height: 8, borderRadius: "50%", background: "var(--green)" }} />
        </div>
      </aside>

      {/* ── MAIN ── */}
      <div style={{ flex: 1, display: "flex", flexDirection: "column", overflow: "hidden" }}>

        {/* Top bar */}
        <header style={{ background: panelBg, borderBottom: `1px solid ${border}`, padding: "0 24px", display: "flex", alignItems: "center", height: 56, flexShrink: 0, gap: 16 }}>
          <div>
            <div style={{ fontWeight: 700, fontSize: 16, color: textPrimary }}>Good morning, Dr. Ramos</div>
            <div style={{ fontSize: 11, color: textSec }}>Tuesday, April 22, 2026 · Ward 4A</div>
          </div>
          <div style={{ flex: 1 }} />

          {/* Search */}
          <div style={{ position: "relative" }}>
            <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Search patients…" style={{ width: 220, padding: "7px 12px 7px 32px", borderRadius: 8, border: `1px solid ${border}`, background: isDark ? "#1e293b" : "var(--panel-alt)", color: textPrimary, fontSize: 13, fontFamily: "'DM Sans',sans-serif", outline: "none" }} />
            <svg style={{ position: "absolute", left: 10, top: "50%", transform: "translateY(-50%)", pointerEvents: "none" }} width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="6" cy="6" r="4" stroke={textSec} strokeWidth="1.5"/><path d="M10 10l2.5 2.5" stroke={textSec} strokeWidth="1.5" strokeLinecap="round"/></svg>
          </div>

          {/* Alert bell */}
          <div style={{ position: "relative", cursor: "pointer" }}>
            <div style={{ width: 36, height: 36, borderRadius: 9, border: `1px solid ${border}`, display: "flex", alignItems: "center", justifyContent: "center", color: textSec }}>
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 2a5 5 0 015 5v3l1 2H2l1-2V7a5 5 0 015-5z" stroke="currentColor" strokeWidth="1.5"/><path d="M6.5 13.5a1.5 1.5 0 003 0" stroke="currentColor" strokeWidth="1.5"/></svg>
            </div>
            {visibleAlerts.length > 0 && <span style={{ position: "absolute", top: -3, right: -3, width: 16, height: 16, borderRadius: "50%", background: "var(--rose)", color: "white", fontSize: 9, fontWeight: 700, display: "flex", alignItems: "center", justifyContent: "center" }}>{visibleAlerts.length}</span>}
          </div>
        </header>

        {/* Body */}
        <div style={{ flex: 1, display: "flex", overflow: "hidden" }}>

          {/* Content */}
          <div style={{ flex: 1, overflowY: "auto", padding: "20px 24px" }}>

            {/* Stats */}
            <div style={{ display: "grid", gridTemplateColumns: "repeat(5, 1fr)", gap: 12, marginBottom: 20 }}>
              {STATS.map((s, i) => (
                <div key={s.label} style={{ background: panelBg, border: `1px solid ${border}`, borderRadius: 12, padding: "14px 16px", animation: `fadeIn 0.3s ease ${i * 0.05}s both` }}>
                  <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}>
                    <div style={{ fontSize: 11, color: textSec, fontWeight: 500 }}>{s.label}</div>
                    <div style={{ width: 28, height: 28, borderRadius: 8, background: `var(--${s.color}-light)`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 13 }}>{s.icon}</div>
                  </div>
                  <div style={{ fontFamily: "'DM Mono',monospace", fontSize: 22, fontWeight: 600, color: textPrimary, lineHeight: 1 }}>{s.value}</div>
                  <div style={{ fontSize: 11, color: textSec, marginTop: 4 }}>{s.sub}</div>
                </div>
              ))}
            </div>

            {/* Alerts strip */}
            {visibleAlerts.length > 0 && (
              <div style={{ marginBottom: 16 }}>
                {visibleAlerts.map(a => (
                  <div key={a.id} onClick={() => { setSelectedPatient(PATIENTS.find(p => p.id === a.patient)); }} style={{ display: "flex", alignItems: "center", gap: 10, padding: "8px 14px", borderRadius: 8, background: a.level === "critical" ? "var(--rose-light)" : "var(--amber-light)", border: `1px solid ${a.level === "critical" ? "oklch(0.62 0.20 15 / 0.2)" : "oklch(0.75 0.16 68 / 0.2)"}`, marginBottom: 6, cursor: "pointer", animation: "fadeIn 0.3s ease" }}>
                    <span style={{ fontSize: 13 }}>{a.level === "critical" ? "🚨" : "⚠️"}</span>
                    <span style={{ flex: 1, fontSize: 12, color: a.level === "critical" ? "var(--rose)" : "var(--amber)", fontWeight: 500 }}>{a.text}</span>
                    <span style={{ fontSize: 11, color: a.level === "critical" ? "var(--rose)" : "var(--amber)", opacity: 0.7 }}>{a.time}</span>
                    <button onClick={e => { e.stopPropagation(); setDismissedAlerts(d => [...d, a.id]); }} style={{ background: "none", border: "none", cursor: "pointer", color: a.level === "critical" ? "var(--rose)" : "var(--amber)", fontSize: 16, lineHeight: 1 }}>×</button>
                  </div>
                ))}
              </div>
            )}

            {/* Filter tabs */}
            <div style={{ display: "flex", gap: 6, marginBottom: 16, alignItems: "center" }}>
              <span style={{ fontSize: 12, color: textSec, fontWeight: 600, marginRight: 6 }}>Filter:</span>
              {["all", "critical", "warning", "stable"].map(f => (
                <button key={f} onClick={() => setFilter(f)} style={{
                  padding: "5px 12px", borderRadius: 20, border: `1px solid ${filter === f ? "var(--teal)" : border}`,
                  background: filter === f ? "var(--teal-light)" : "transparent",
                  color: filter === f ? "var(--teal-dark)" : textSec,
                  fontSize: 12, fontFamily: "'DM Sans',sans-serif", fontWeight: filter === f ? 600 : 400, cursor: "pointer", textTransform: "capitalize",
                  transition: "all 0.12s",
                }}>{f}</button>
              ))}
              <div style={{ marginLeft: "auto", fontSize: 12, color: textSec }}>{filteredPatients.length} patients</div>
            </div>

            {/* Patient grid */}
            <div style={{ display: "grid", gridTemplateColumns: selectedPatient ? "1fr 1fr" : "repeat(3, 1fr)", gap: 12, transition: "grid-template-columns 0.2s" }}>
              {filteredPatients.map(p => (
                <PatientCard key={p.id} patient={p} selected={selectedPatient?.id === p.id} onClick={() => setSelectedPatient(s => s?.id === p.id ? null : p)} tweaks={tweaks} />
              ))}
            </div>
          </div>

          {/* ── RIGHT PANEL: Quick Actions + Detail ── */}
          <div style={{ display: "flex", flexDirection: "column", flexShrink: 0 }}>

            {/* Quick actions */}
            <div style={{ width: 220, background: panelBg, borderLeft: `1px solid ${border}`, padding: "16px", flexShrink: 0 }}>
              <div style={{ fontSize: 11, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.08em", color: textSec, marginBottom: 12 }}>Quick Actions</div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
                {QUICK_ACTIONS.map(a => (
                  <button key={a.label} onClick={() => triggerAction(a.label)} style={{
                    display: "flex", flexDirection: "column", alignItems: "center", gap: 6, padding: "12px 8px", borderRadius: 10,
                    border: `1px solid ${border}`, background: isDark ? "#1e293b" : "var(--panel-alt)",
                    cursor: "pointer", transition: "all 0.12s", fontFamily: "'DM Sans',sans-serif",
                  }}
                  onMouseEnter={e => { e.currentTarget.style.borderColor = `var(--${a.color})`; e.currentTarget.style.background = `var(--${a.color}-light)`; }}
                  onMouseLeave={e => { e.currentTarget.style.borderColor = border; e.currentTarget.style.background = isDark ? "#1e293b" : "var(--panel-alt)"; }}>
                    <span style={{ fontSize: 18 }}>{a.icon}</span>
                    <span style={{ fontSize: 10, fontWeight: 600, color: textSec, textAlign: "center", lineHeight: 1.3 }}>{a.label}</span>
                  </button>
                ))}
              </div>

              {/* Shift summary */}
              <div style={{ marginTop: 16, padding: "12px", borderRadius: 10, background: isDark ? "#1e293b" : "var(--panel-alt)", border: `1px solid ${border}` }}>
                <div style={{ fontSize: 11, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.06em", color: textSec, marginBottom: 8 }}>Shift Summary</div>
                {[["On Duty", "12 staff"], ["Pending Labs", "7"], ["Awaiting Consult", "3"], ["ICU Capacity", "68%"]].map(([k, v]) => (
                  <div key={k} style={{ display: "flex", justifyContent: "space-between", fontSize: 12, marginBottom: 5 }}>
                    <span style={{ color: textSec }}>{k}</span>
                    <span style={{ fontWeight: 600, color: textPrimary, fontFamily: "'DM Mono',monospace", fontSize: 12 }}>{v}</span>
                  </div>
                ))}
              </div>
            </div>

            {/* Detail panel */}
            {selectedPatient && <DetailPanel patient={selectedPatient} onClose={() => setSelectedPatient(null)} tweaks={tweaks} />}
          </div>
        </div>
      </div>

      {/* ── ACTION FEEDBACK TOAST ── */}
      {actionFeedback && (
        <div style={{ position: "fixed", bottom: 24, left: "50%", transform: "translateX(-50%)", background: "#0f172a", color: "white", padding: "10px 20px", borderRadius: 10, fontSize: 13, fontWeight: 600, boxShadow: "0 8px 32px rgba(0,0,0,0.3)", animation: "fadeIn 0.2s ease", zIndex: 100, display: "flex", alignItems: "center", gap: 8 }}>
          <span style={{ color: "var(--teal)" }}>✓</span> {actionFeedback} initiated
        </div>
      )}

      {/* ── TWEAKS PANEL ── */}
      {tweaksOpen && (
        <div style={{ position: "fixed", bottom: 24, right: 24, width: 240, background: isDark ? "#1e293b" : "white", border: `1px solid ${border}`, borderRadius: 14, boxShadow: "0 16px 48px rgba(0,0,0,0.15)", padding: "16px", zIndex: 200, animation: "slideIn 0.2s ease" }}>
          <div style={{ fontWeight: 700, fontSize: 13, color: textPrimary, marginBottom: 14 }}>Tweaks</div>

          {[
            { label: "Theme", key: "theme", options: ["light", "dark"] },
            { label: "Density", key: "density", options: ["comfortable", "compact"] },
          ].map(({ label, key, options }) => (
            <div key={key} style={{ marginBottom: 12 }}>
              <div style={{ fontSize: 11, color: textSec, fontWeight: 600, marginBottom: 6 }}>{label}</div>
              <div style={{ display: "flex", gap: 6 }}>
                {options.map(o => (
                  <button key={o} onClick={() => updateTweak(key, o)} style={{ flex: 1, padding: "6px", borderRadius: 7, border: `1px solid ${tweaks[key] === o ? "var(--teal)" : border}`, background: tweaks[key] === o ? "var(--teal-light)" : "transparent", color: tweaks[key] === o ? "var(--teal-dark)" : textSec, fontSize: 11, fontFamily: "'DM Sans',sans-serif", fontWeight: 600, cursor: "pointer", textTransform: "capitalize" }}>{o}</button>
                ))}
              </div>
            </div>
          ))}

          <div style={{ marginBottom: 12 }}>
            <div style={{ fontSize: 11, color: textSec, fontWeight: 600, marginBottom: 6 }}>Show Alerts</div>
            <button onClick={() => updateTweak("showAlerts", !tweaks.showAlerts)} style={{ width: "100%", padding: "6px", borderRadius: 7, border: `1px solid ${tweaks.showAlerts ? "var(--teal)" : border}`, background: tweaks.showAlerts ? "var(--teal-light)" : "transparent", color: tweaks.showAlerts ? "var(--teal-dark)" : textSec, fontSize: 11, fontFamily: "'DM Sans',sans-serif", fontWeight: 600, cursor: "pointer" }}>{tweaks.showAlerts ? "On" : "Off"}</button>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
