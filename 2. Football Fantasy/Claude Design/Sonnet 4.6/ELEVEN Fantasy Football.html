<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ELEVEN — Fantasy Football</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  :root {
    --bg: oklch(0.10 0.025 252);
    --bg2: oklch(0.13 0.02 252);
    --bg3: oklch(0.17 0.02 252);
    --surface: oklch(0.16 0.02 252 / 0.7);
    --surface2: oklch(0.20 0.022 252 / 0.8);
    --border: oklch(0.28 0.02 252 / 0.5);
    --green: oklch(0.78 0.22 142);
    --green-dim: oklch(0.78 0.22 142 / 0.15);
    --green-glow: oklch(0.78 0.22 142 / 0.4);
    --gold: oklch(0.78 0.16 82);
    --gold-dim: oklch(0.78 0.16 82 / 0.15);
    --red: oklch(0.70 0.20 22);
    --red-dim: oklch(0.70 0.20 22 / 0.15);
    --text: oklch(0.96 0.005 252);
    --text-dim: oklch(0.65 0.01 252);
    --text-muted: oklch(0.45 0.01 252);
    --accent: var(--green);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; overflow: hidden; }

  /* Stadium texture background */
  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 0;
    background-image:
      repeating-linear-gradient(
        0deg,
        transparent,
        transparent 48px,
        oklch(0.18 0.02 252 / 0.3) 48px,
        oklch(0.18 0.02 252 / 0.3) 50px
      ),
      radial-gradient(ellipse 80% 60% at 50% 0%, oklch(0.78 0.22 142 / 0.06) 0%, transparent 70%);
    pointer-events: none;
  }

  #root { height: 100vh; display: flex; flex-direction: column; position: relative; z-index: 1; }

  /* Top nav */
  .top-nav {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 24px; height: 64px;
    background: oklch(0.11 0.025 252 / 0.95);
    border-bottom: 1px solid var(--border);
    backdrop-filter: blur(20px);
    flex-shrink: 0;
  }
  .logo { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 4px; color: var(--green); }
  .logo span { color: var(--text); }
  .nav-budget { display: flex; align-items: center; gap: 8px; }
  .budget-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
  .budget-value { font-family: 'Bebas Neue'; font-size: 22px; color: var(--gold); letter-spacing: 1px; }
  .nav-avatar { width: 36px; height: 36px; border-radius: 50%; background: var(--green-dim); border: 2px solid var(--green); display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; color: var(--green); cursor: pointer; }

  /* Tab bar */
  .tab-bar {
    display: flex; align-items: center;
    padding: 0 24px; height: 50px;
    background: oklch(0.12 0.025 252 / 0.95);
    border-bottom: 1px solid var(--border);
    gap: 4px; flex-shrink: 0;
  }
  .tab {
    padding: 6px 18px; border-radius: 6px;
    font-size: 13px; font-weight: 500;
    color: var(--text-muted); cursor: pointer;
    transition: all 0.2s; border: 1px solid transparent;
    white-space: nowrap;
  }
  .tab:hover { color: var(--text); background: var(--surface); }
  .tab.active {
    color: var(--green); background: var(--green-dim);
    border-color: oklch(0.78 0.22 142 / 0.3);
  }

  /* Main content */
  .main { flex: 1; overflow-y: auto; overflow-x: hidden; padding: 24px; }
  .main::-webkit-scrollbar { width: 6px; }
  .main::-webkit-scrollbar-track { background: transparent; }
  .main::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* Cards */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    backdrop-filter: blur(16px);
    overflow: hidden;
  }
  .card-header {
    padding: 16px 20px 12px;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid var(--border);
  }
  .card-title { font-family: 'Bebas Neue'; font-size: 18px; letter-spacing: 2px; color: var(--text); }
  .card-body { padding: 16px 20px; }

  /* Dashboard grid */
  .dash-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; }
  .dash-grid-wide { grid-column: 1 / -1; }
  .dash-grid-2 { grid-column: span 2; }

  /* Stat cards */
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px; padding: 20px;
    position: relative; overflow: hidden;
  }
  .stat-card::before {
    content: ''; position: absolute; top: -1px; left: 0; right: 0; height: 2px;
    background: var(--accent-line, var(--green));
  }
  .stat-card-label { font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text-muted); margin-bottom: 8px; }
  .stat-card-value { font-family: 'Bebas Neue'; font-size: 42px; line-height: 1; letter-spacing: 2px; }
  .stat-card-sub { font-size: 12px; color: var(--text-dim); margin-top: 4px; }
  .stat-card-delta { font-size: 12px; font-weight: 600; }
  .delta-up { color: var(--green); }
  .delta-down { color: var(--red); }

  /* Fixture row */
  .fixture {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 0; border-bottom: 1px solid var(--border);
  }
  .fixture:last-child { border-bottom: none; }
  .fixture-team { display: flex; align-items: center; gap: 10px; font-size: 14px; font-weight: 500; }
  .team-badge { width: 32px; height: 32px; border-radius: 8px; background: var(--bg3); display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; color: var(--text-dim); }
  .fixture-score { font-family: 'Bebas Neue'; font-size: 22px; color: var(--gold); letter-spacing: 2px; }
  .fixture-status { font-size: 11px; color: var(--text-muted); text-align: center; }

  /* Recent transfers */
  .transfer-row {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 0; border-bottom: 1px solid var(--border);
  }
  .transfer-row:last-child { border-bottom: none; }
  .player-avatar { width: 36px; height: 36px; border-radius: 50%; background: var(--bg3); display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; color: var(--text-dim); flex-shrink: 0; }
  .transfer-info { flex: 1; }
  .transfer-name { font-size: 13px; font-weight: 600; }
  .transfer-detail { font-size: 11px; color: var(--text-muted); }
  .transfer-price { font-family: 'Bebas Neue'; font-size: 16px; }

  /* PITCH VIEW */
  .pitch-container { width: 100%; max-width: 560px; margin: 0 auto; }
  .pitch {
    background:
      repeating-linear-gradient(180deg, oklch(0.38 0.12 142) 0px, oklch(0.38 0.12 142) 44px, oklch(0.34 0.13 142) 44px, oklch(0.34 0.13 142) 88px);
    border-radius: 12px; position: relative; overflow: hidden;
    border: 2px solid oklch(0.50 0.10 142 / 0.5);
    aspect-ratio: 7/10;
  }
  .pitch::before {
    content: '';
    position: absolute; inset: 0;
    border: 4px solid oklch(1 0 0 / 0.2);
    border-radius: 10px;
    pointer-events: none;
  }
  /* Center circle */
  .pitch::after {
    content: '';
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 120px; height: 120px;
    border-radius: 50%;
    border: 2px solid oklch(1 0 0 / 0.2);
    pointer-events: none;
  }
  .pitch-row { display: flex; justify-content: center; gap: 12px; padding: 0 10px; position: absolute; left: 0; right: 0; }
  .player-token {
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    cursor: pointer; transition: transform 0.2s;
  }
  .player-token:hover { transform: scale(1.08); }
  .player-token.selected .player-circle { border-color: var(--gold); box-shadow: 0 0 16px oklch(0.78 0.16 82 / 0.6); }
  .player-circle {
    width: 52px; height: 52px; border-radius: 50%;
    background: var(--bg2);
    border: 2px solid oklch(1 0 0 / 0.3);
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; font-weight: 700; color: var(--text);
    position: relative;
    box-shadow: 0 4px 12px oklch(0 0 0 / 0.5);
  }
  .player-pts {
    position: absolute; bottom: -6px; left: 50%; transform: translateX(-50%);
    background: var(--green); color: var(--bg); font-size: 9px; font-weight: 700;
    padding: 1px 5px; border-radius: 6px; white-space: nowrap;
  }
  .player-token-name { font-size: 10px; font-weight: 600; color: oklch(1 0 0 / 0.9); text-shadow: 0 1px 3px oklch(0 0 0 / 0.8); white-space: nowrap; text-align: center; }
  .player-token-pos { font-size: 9px; color: oklch(1 0 0 / 0.6); }

  /* Squad sidebar */
  .squad-layout { display: grid; grid-template-columns: 1fr 280px; gap: 20px; align-items: start; }
  .player-detail-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px; padding: 20px;
    animation: fadeSlide 0.2s ease;
  }
  @keyframes fadeSlide { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  .player-detail-header { display: flex; gap: 16px; margin-bottom: 16px; }
  .player-detail-avatar { width: 64px; height: 64px; border-radius: 50%; background: var(--bg3); display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: 700; color: var(--green); border: 2px solid var(--green); }
  .player-detail-info { flex: 1; }
  .player-detail-name { font-family: 'Bebas Neue'; font-size: 22px; letter-spacing: 2px; }
  .player-detail-club { font-size: 12px; color: var(--text-muted); }
  .player-detail-pos { display: inline-block; margin-top: 4px; padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
  .pos-gk { background: oklch(0.65 0.18 50 / 0.2); color: oklch(0.75 0.18 50); }
  .pos-def { background: oklch(0.60 0.18 240 / 0.2); color: oklch(0.70 0.18 240); }
  .pos-mid { background: oklch(0.78 0.22 142 / 0.2); color: var(--green); }
  .pos-fwd { background: oklch(0.70 0.20 22 / 0.2); color: var(--red); }

  .stat-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
  .stat-row:last-child { border-bottom: none; }
  .stat-row-label { color: var(--text-dim); }
  .stat-row-val { font-weight: 600; color: var(--text); }

  /* Market */
  .market-filters { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
  .filter-btn {
    padding: 6px 14px; border-radius: 6px; font-size: 12px; font-weight: 500;
    background: var(--bg3); border: 1px solid var(--border); color: var(--text-dim);
    cursor: pointer; transition: all 0.15s;
  }
  .filter-btn:hover { color: var(--text); border-color: oklch(0.4 0.02 252); }
  .filter-btn.active { background: var(--green-dim); border-color: oklch(0.78 0.22 142 / 0.4); color: var(--green); }

  .player-market-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; }
  .market-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px; padding: 16px;
    cursor: pointer; transition: all 0.2s;
    position: relative; overflow: hidden;
  }
  .market-card:hover { border-color: oklch(0.78 0.22 142 / 0.4); transform: translateY(-2px); box-shadow: 0 8px 24px oklch(0 0 0 / 0.3); }
  .market-card.owned { border-color: oklch(0.78 0.22 142 / 0.3); }
  .market-card.owned::after { content: '✓ IN SQUAD'; position: absolute; top: 10px; right: 10px; font-size: 9px; font-weight: 700; color: var(--green); }
  .market-card-top { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  .market-card-name { font-weight: 600; font-size: 14px; }
  .market-card-club { font-size: 11px; color: var(--text-muted); }
  .market-card-stats { display: flex; justify-content: space-between; }
  .market-stat { text-align: center; }
  .market-stat-val { font-family: 'Bebas Neue'; font-size: 20px; letter-spacing: 1px; }
  .market-stat-label { font-size: 9px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
  .market-card-price { margin-top: 12px; padding-top: 10px; border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .price-tag { font-family: 'Bebas Neue'; font-size: 18px; color: var(--gold); letter-spacing: 1px; }
  .buy-btn {
    padding: 5px 14px; border-radius: 6px; font-size: 12px; font-weight: 600;
    background: var(--green); color: var(--bg); border: none; cursor: pointer;
    transition: all 0.15s;
  }
  .buy-btn:hover { background: oklch(0.85 0.22 142); }
  .buy-btn:disabled { background: var(--bg3); color: var(--text-muted); cursor: default; }
  .sell-btn {
    padding: 5px 14px; border-radius: 6px; font-size: 12px; font-weight: 600;
    background: var(--red-dim); color: var(--red); border: 1px solid oklch(0.70 0.20 22 / 0.3);
    cursor: pointer; transition: all 0.15s;
  }

  /* Tournament */
  .tournament-layout { display: grid; grid-template-columns: 1fr 360px; gap: 20px; }
  .league-table { width: 100%; border-collapse: collapse; }
  .league-table th { font-size: 10px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text-muted); padding: 8px 12px; text-align: left; border-bottom: 1px solid var(--border); }
  .league-table td { padding: 12px; font-size: 13px; border-bottom: 1px solid oklch(0.28 0.02 252 / 0.2); }
  .league-table tr:hover td { background: var(--surface); }
  .table-rank { font-family: 'Bebas Neue'; font-size: 18px; color: var(--text-muted); width: 32px; }
  .table-rank.top3 { color: var(--gold); }
  .table-name { font-weight: 600; }
  .table-pts { font-family: 'Bebas Neue'; font-size: 18px; color: var(--green); }
  .table-num { color: var(--text-dim); text-align: center; }
  .you-row td { background: oklch(0.78 0.22 142 / 0.06) !important; }
  .you-badge { display: inline-block; margin-left: 6px; padding: 1px 5px; background: var(--green-dim); color: var(--green); font-size: 9px; font-weight: 700; border-radius: 3px; }

  /* Matchup card */
  .matchup-card {
    background: var(--surface2); border: 1px solid var(--border); border-radius: 12px;
    padding: 20px; margin-bottom: 12px;
  }
  .matchup-week { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; }
  .matchup-teams { display: flex; align-items: center; gap: 12px; }
  .matchup-team { flex: 1; text-align: center; }
  .matchup-score-box { font-family: 'Bebas Neue'; font-size: 32px; letter-spacing: 2px; padding: 0 16px; color: var(--gold); }
  .matchup-team-name { font-weight: 600; font-size: 14px; margin-top: 6px; }
  .matchup-pts { font-size: 12px; color: var(--text-muted); }
  .vs-badge { font-family: 'Bebas Neue'; font-size: 14px; color: var(--text-muted); letter-spacing: 2px; }

  /* Notification toast */
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: var(--green); color: var(--bg); padding: 12px 24px; border-radius: 8px;
    font-weight: 600; font-size: 14px; z-index: 1000;
    animation: toastIn 0.3s ease, toastOut 0.3s ease 2s forwards;
  }
  @keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(20px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
  @keyframes toastOut { to { opacity: 0; transform: translateX(-50%) translateY(20px); } }

  /* Budget bar */
  .budget-bar-wrap { margin-bottom: 16px; }
  .budget-bar-labels { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 6px; }
  .budget-bar-track { height: 6px; background: var(--bg3); border-radius: 3px; overflow: hidden; }
  .budget-bar-fill { height: 100%; background: var(--green); border-radius: 3px; transition: width 0.4s ease; }

  /* Tweaks panel */
  .tweaks-panel {
    position: fixed; bottom: 24px; right: 24px; z-index: 999;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 12px; padding: 16px; width: 220px;
    backdrop-filter: blur(20px);
    animation: fadeSlide 0.2s ease;
  }
  .tweaks-title { font-family: 'Bebas Neue'; font-size: 16px; letter-spacing: 2px; margin-bottom: 14px; color: var(--text); }
  .tweak-row { margin-bottom: 12px; }
  .tweak-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
  .tweak-options { display: flex; gap: 6px; flex-wrap: wrap; }
  .tweak-opt {
    padding: 4px 10px; border-radius: 5px; font-size: 11px; font-weight: 500;
    background: var(--bg3); border: 1px solid var(--border); color: var(--text-dim);
    cursor: pointer; transition: all 0.15s;
  }
  .tweak-opt.selected { background: var(--green-dim); border-color: oklch(0.78 0.22 142 / 0.4); color: var(--green); }

  /* Misc */
  .section-label { font-family: 'Bebas Neue'; font-size: 13px; letter-spacing: 2px; color: var(--text-muted); text-transform: uppercase; margin-bottom: 12px; }
  .chip { display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }
  .chip-green { background: var(--green-dim); color: var(--green); }
  .chip-gold { background: var(--gold-dim); color: var(--gold); }
  .chip-red { background: var(--red-dim); color: var(--red); }
  .rank-1 { color: var(--gold); }
  .form-dots { display: flex; gap: 4px; }
  .form-dot { width: 8px; height: 8px; border-radius: 50%; }
  .form-dot.w { background: var(--green); }
  .form-dot.d { background: var(--gold); }
  .form-dot.l { background: var(--red); }

  @media (max-width: 900px) {
    .dash-grid { grid-template-columns: 1fr 1fr; }
    .squad-layout { grid-template-columns: 1fr; }
    .tournament-layout { grid-template-columns: 1fr; }
  }
</style>
</head>

<div id="root"></div>

function PlayerToken({ player, selected, onSelect, showPoints }) {
  const posColors = { GK:'#f5a623', DEF:'#4a9eff', MID:'#2ecc71', FWD:'#e74c3c' };
  return (
    <div className={`player-token ${selected ? 'selected' : ''}`} onClick={() => onSelect(player)}>
      <div className="player-circle" style={{ borderColor: posColors[player.pos] + '88' }}>
        <span>{player.short}</span>
        {showPoints && <span className="player-pts">{Math.round(player.pts / 14)}pt</span>}
      </div>
      <div className="player-token-name">{player.name.split(' ').pop()}</div>
      <div className="player-token-pos" style={{ color: posColors[player.pos] }}>{player.pos}</div>
    </div>
  );
}

function Pitch({ squad, selected, onSelect, formation, showPoints }) {
  const fmt = FORMATIONS[formation] || FORMATIONS['4-3-3'];
  const gks = squad.filter(p => p.pos === 'GK');
  const defs = squad.filter(p => p.pos === 'DEF');
  const mids = squad.filter(p => p.pos === 'MID');
  const fwds = squad.filter(p => p.pos === 'FWD');

  function renderRow(players, positions, topPct) {
    return (
      <div className="pitch-row" style={{ top: `${topPct}%`, transform: 'translateY(-50%)' }}>
        {players.map((p, i) => (
          <PlayerToken key={p.id} player={p} selected={selected?.id === p.id} onSelect={onSelect} showPoints={showPoints} />
        ))}
      </div>
    );
  }

  return (
    <div className="pitch">
      {renderRow(fwds, fmt.FWD, 15)}
      {renderRow(mids, fmt.MID, 38)}
      {renderRow(defs, fmt.DEF, 62)}
      {renderRow(gks, fmt.GK, 85)}
    </div>
  );
}

function MySquad({ squad, setSquad, budget, setBudget, tweaks }) {
  const [selected, setSelected] = useState(null);
  const formation = tweaks.formation;

  const handleTransfer = (player, type) => {
    if (type === 'sell') {
      setSquad(prev => prev.filter(p => p.id !== player.id));
      setBudget(prev => +(prev + player.price).toFixed(1));
      setSelected(null);
    }
  };

  return (
    <div className="squad-layout">
      <div>
        <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:12 }}>

        </div>
        <div style={{ marginTop:12, display:'flex', gap:8, justifyContent:'center' }}>
          {['GK','DEF','MID','FWD'].map(pos => {

            return (
              <div key={pos} style={{ textAlign:'center', padding:'6px 14px', background:'var(--surface)', borderRadius:8, border:'1px solid var(--border)' }}>

function Market({ squad, setSquad, budget, setBudget, toast }) {
  const [filter, setFilter] = useState('ALL');
  const [sortBy, setSortBy] = useState('pts');
  const [selected, setSelected] = useState(null);

  const filters = ['ALL','GK','DEF','MID','FWD'];
  const sorts = [{ k:'pts', l:'Top Pts' }, { k:'price', l:'Price' }, { k:'rating', l:'Rating' }];

  const visible = ALL_PLAYERS
    .filter(p => filter === 'ALL' || p.pos === filter)
    .sort((a,b) => b[sortBy] - a[sortBy]);

  const owned = (p) => squad.some(s => s.id === p.id);

  const handleBuy = (player) => {
    if (budget < player.price) { toast('Not enough budget!'); return; }
    if (squad.length >= 15) { toast('Squad is full!'); return; }
    if (owned(player)) { toast('Already in squad!'); return; }
    setSquad(prev => [...prev, player]);
    setBudget(prev => +(prev - player.price).toFixed(1));
    toast(`✓ ${player.name.split(' ').pop()} signed for £${player.price}m`);
  };
  const handleSell = (player) => {
    setSquad(prev => prev.filter(p => p.id !== player.id));
    setBudget(prev => +(prev + player.price).toFixed(1));
    toast(`${player.name.split(' ').pop()} sold for £${player.price}m`);
  };

  return (
    <div>
      <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:16 }}>
        <div>
          <div style={{ fontFamily:'Bebas Neue', fontSize:22, letterSpacing:3 }}>TRANSFER MARKET</div>
          <div style={{ fontSize:12, color:'var(--text-muted)' }}>{ALL_PLAYERS.length} players available</div>
        </div>
        <div style={{ display:'flex', gap:8, alignItems:'center' }}>
          <span style={{ fontSize:11, color:'var(--text-muted)' }}>Budget:</span>
          <span style={{ fontFamily:'Bebas Neue', fontSize:20, color:'var(--gold)' }}>£{budget.toFixed(1)}m</span>
        </div>
      </div>
      <div style={{ display:'flex', gap:12, marginBottom:16, alignItems:'center', flexWrap:'wrap' }}>
        <div className="market-filters" style={{ margin:0 }}>
          {filters.map(f => (
            <button key={f} className={`filter-btn ${filter===f?'active':''}`} onClick={() => setFilter(f)}>{f}</button>
          ))}
        </div>
        <div style={{ flex:1 }}></div>
        <div style={{ display:'flex', gap:6, fontSize:12, color:'var(--text-muted)', alignItems:'center' }}>
          Sort:
          {sorts.map(s => (
            <button key={s.k} className={`filter-btn ${sortBy===s.k?'active':''}`} onClick={() => setSortBy(s.k)}>{s.l}</button>
          ))}
        </div>
      </div>
      <div className="player-market-grid">
        {visible.map(p => {
          const isOwned = owned(p);
          return (
            <div key={p.id} className={`market-card ${isOwned?'owned':''}`} onClick={() => setSelected(selected?.id===p.id?null:p)}>
              <div className="market-card-top">
                <div className="player-avatar" style={{ width:40,height:40,fontSize:14 }}>{p.short}</div>
                <div>
                  <div className="market-card-name">{p.name}</div>
                  <div className="market-card-club">{p.club}</div>
                </div>
              </div>
              <div className="market-card-stats">
                {[{l:'PTS',v:p.pts},{l:'GLS',v:p.goals},{l:'AST',v:p.assists}].map(s => (
                  <div key={s.l} className="market-stat">
                    <div className="market-stat-val" style={{ color: s.l==='PTS'?'var(--green)':'var(--text)' }}>{s.v}</div>
                    <div className="market-stat-label">{s.l}</div>
                  </div>
                ))}
              </div>
              <div className="market-card-price">
                <span className="price-tag">£{p.price}m</span>
                {isOwned
                  ? <button className="sell-btn" onClick={e => { e.stopPropagation(); handleSell(p); }}>Sell</button>
                  : <button className="buy-btn" disabled={budget < p.price} onClick={e => { e.stopPropagation(); handleBuy(p); }}>Sign</button>
                }
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

              <div className="matchup-team">
                <div className="team-badge" style={{ width:48, height:48, margin:'0 auto', borderRadius:10, fontSize:14 }}>YOU</div>
                <div className="matchup-team-name">Your Squad</div>
                <div className="matchup-pts">{m.score1} pts</div>
              </div>
              <div style={{ textAlign:'center' }}>
                <div className="matchup-score-box">{m.score1}–{m.score2}</div>
                <div className="vs-badge">VS</div>
              </div>
              <div className="matchup-team">
                <div className="team-badge" style={{ width:48, height:48, margin:'0 auto', borderRadius:10, fontSize:10, fontWeight:700 }}>{m.team2.slice(0,3).toUpperCase()}</div>
                <div className="matchup-team-name">{m.team2}</div>
                <div className="matchup-pts">{m.score2} pts</div>
              </div>
            </div>
            {m.score1 > m.score2
              ? <div style={{ textAlign:'center', marginTop:12 }}><span className="chip chip-green">WIN +{m.score1-m.score2}</span></div>
              : <div style={{ textAlign:'center', marginTop:12 }}><span className="chip chip-red">LOSS -{m.score2-m.score1}</span></div>
            }
          </div>
        ))}

        <div style={{ marginTop:16 }}>
          <div style={{ fontFamily:'Bebas Neue', fontSize:16, letterSpacing:2, color:'var(--text-muted)', marginBottom:12 }}>MINI LEAGUE</div>
          <div className="card">
            <div className="card-body">
              <div style={{ fontSize:13, color:'var(--text-dim)', marginBottom:8 }}>Next opponent</div>
              <div style={{ display:'flex', alignItems:'center', gap:12 }}>
                <div style={{ flex:1 }}>
                  <div style={{ fontWeight:600 }}>SalahSultans</div>
                  <div style={{ fontSize:12, color:'var(--text-muted)' }}>GW28 avg: 78 pts</div>
                </div>
                <span className="chip chip-red">Tough matchup</span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

// ── ROOT APP ──────────────────────────────────────────────────────────────────
function App() {
  const saved = (() => { try { return JSON.parse(localStorage.getItem('eleven_state') || '{}'); } catch { return {}; } })();
  const [tab, setTab] = useState(saved.tab || 'dashboard');
  const [squadIds, setSquadIds] = useState(saved.squadIds || INITIAL_SQUAD_IDS);
  const [budget, setBudget] = useState(saved.budget ?? 18.5);
  const [toastMsg, setToastMsg] = useState(null);
  const [showTweaks, setShowTweaks] = useState(false);
  const [tweaks, setTweaks] = useState(() => {
    const saved = (() => { try { return JSON.parse(localStorage.getItem('eleven_tweaks') || '{}'); } catch { return {}; } })();
    return { ...TWEAK_DEFAULTS, ...saved };
  });

  const squad = ALL_PLAYERS.filter(p => squadIds.includes(p.id));
  const setSquad = (fn) => {
    const next = typeof fn === 'function' ? fn(squad) : fn;
    setSquadIds(next.map(p => p.id));
  };

  useEffect(() => {
    localStorage.setItem('eleven_state', JSON.stringify({ tab, squadIds, budget }));
  }, [tab, squadIds, budget]);

  useEffect(() => {
    localStorage.setItem('eleven_tweaks', JSON.stringify(tweaks));
  }, [tweaks]);

  const toast = (msg) => { setToastMsg(msg); setTimeout(() => setToastMsg(null), 2500); };

  // Tweaks toggle
  useEffect(() => {
    window.addEventListener('message', (e) => {
      if (e.data?.type === '__activate_edit_mode') setShowTweaks(true);
      if (e.data?.type === '__deactivate_edit_mode') setShowTweaks(false);
    });
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
  }, []);

  const updateTweak = (k, v) => {
    const next = { ...tweaks, [k]: v };
    setTweaks(next);
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: next }, '*');
  };

  const tabs = [
    { id:'dashboard', label:'Dashboard' },
    { id:'squad', label:'My Squad' },
    { id:'market', label:'Transfer Market' },
    { id:'tournament', label:'Tournament' },
  ];

  return (
    <>
      <div className="top-nav">
        <div className="logo">EL<span>EVEN</span></div>
        <div className="nav-budget">
          <div className="budget-label">Budget</div>
          <div className="budget-value">£{budget.toFixed(1)}m</div>
        </div>
        <div className="nav-avatar">JD</div>
      </div>

      <div className="tab-bar">
        {tabs.map(t => (
          <div key={t.id} className={`tab ${tab===t.id?'active':''}`} onClick={() => setTab(t.id)}>
            {t.label}
          </div>
        ))}
        <div style={{ flex:1 }}></div>
        <div style={{ fontSize:12, color:'var(--text-muted)' }}>GW29 · Deadline Fri 18:30</div>
      </div>

      <div className="main">
        {tab === 'dashboard' && <Dashboard squad={squad} budget={budget} />}
        {tab === 'squad' && <MySquad squad={squad} setSquad={setSquad} budget={budget} setBudget={setBudget} tweaks={tweaks} />}
        {tab === 'market' && <Market squad={squad} setSquad={setSquad} budget={budget} setBudget={setBudget} toast={toast} />}
        {tab === 'tournament' && <Tournament />}
      </div>

      {toastMsg && <div className="toast">{toastMsg}</div>}

      {showTweaks && (
        <div className="tweaks-panel">
          <div className="tweaks-title">Tweaks</div>

          <div className="tweak-row">
            <div className="tweak-label">Accent Color</div>
            <div className="tweak-options">
              {[['green','#2ecc71'],['blue','#4a9eff'],['purple','#a855f7'],['orange','#f59e0b']].map(([k,v]) => (
                <div key={k} className={`tweak-opt ${tweaks.accentColor===k?'selected':''}`} onClick={() => {
                  updateTweak('accentColor', k);
                  document.documentElement.style.setProperty('--green', v);
                  document.documentElement.style.setProperty('--green-dim', v + '26');
                  document.documentElement.style.setProperty('--green-glow', v + '66');
                }} style={{ display:'flex', alignItems:'center', gap:5 }}>
                  <span style={{ width:8, height:8, borderRadius:'50%', background:v, display:'inline-block' }}></span>
                  {k}
                </div>
              ))}
            </div>
          </div>

          <div className="tweak-row">
            <div className="tweak-label">Formation</div>
            <div className="tweak-options">
              {['4-3-3','4-4-2','3-5-2'].map(f => (
                <div key={f} className={`tweak-opt ${tweaks.formation===f?'selected':''}`} onClick={() => updateTweak('formation', f)}>{f}</div>
              ))}
            </div>
          </div>

          <div className="tweak-row">
            <div className="tweak-label">Show Points on Pitch</div>
            <div className="tweak-options">
              {[['Yes',true],['No',false]].map(([l,v]) => (
                <div key={l} className={`tweak-opt ${tweaks.showPoints===v?'selected':''}`} onClick={() => updateTweak('showPoints', v)}>{l}</div>
              ))}
            </div>
          </div>
        </div>
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
