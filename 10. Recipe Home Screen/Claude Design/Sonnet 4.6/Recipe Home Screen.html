<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recipe App</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="ios-frame.jsx"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: oklch(14% 0.02 50);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'DM Sans', sans-serif;
  }

  /* Tweaks Panel */
  #tweaks-panel {
    display: none;
    position: fixed;
    bottom: 24px; right: 24px;
    background: oklch(98% 0.005 50);
    border: 1px solid oklch(90% 0.01 50);
    border-radius: 16px;
    padding: 20px;
    width: 260px;
    z-index: 9999;
    box-shadow: 0 8px 32px rgba(0,0,0,0.18);
    font-family: 'DM Sans', sans-serif;
  }
  #tweaks-panel.visible { display: block; }
  #tweaks-panel h3 { font-size: 13px; font-weight: 600; color: oklch(35% 0.02 50); margin-bottom: 16px; letter-spacing: 0.08em; text-transform: uppercase; }
  .tweak-row { margin-bottom: 14px; }
  .tweak-label { font-size: 12px; font-weight: 500; color: oklch(45% 0.015 50); margin-bottom: 6px; display: block; }
  .tweak-options { display: flex; gap: 6px; flex-wrap: wrap; }
  .tweak-opt {
    padding: 5px 10px; border-radius: 20px; font-size: 11px; font-weight: 500;
    border: 1.5px solid oklch(85% 0.01 50); background: white; cursor: pointer;
    color: oklch(35% 0.02 50); transition: all 0.15s;
  }
  .tweak-opt.active { background: var(--accent); border-color: var(--accent); color: white; }
</style>
</head>
<body>
<div id="root"></div>

<div id="tweaks-panel">
  <h3>Tweaks</h3>
  <div class="tweak-row">
    <span class="tweak-label">Accent Color</span>
    <div class="tweak-options" id="tweak-accent">
      <button class="tweak-opt active" data-val="terracotta">Terracotta</button>
      <button class="tweak-opt" data-val="sage">Sage</button>
      <button class="tweak-opt" data-val="plum">Plum</button>
      <button class="tweak-opt" data-val="ochre">Ochre</button>
    </div>
  </div>
  <div class="tweak-row">
    <span class="tweak-label">Card Style</span>
    <div class="tweak-options" id="tweak-card">
      <button class="tweak-opt active" data-val="tall">Tall Hero</button>
      <button class="tweak-opt" data-val="compact">Compact</button>
    </div>
  </div>
  <div class="tweak-row">
    <span class="tweak-label">Background</span>
    <div class="tweak-options" id="tweak-bg">
      <button class="tweak-opt active" data-val="cream">Cream</button>
      <button class="tweak-opt" data-val="white">White</button>
      <button class="tweak-opt" data-val="dark">Dark</button>
    </div>
  </div>
</div>

<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accent": "terracotta",
  "cardStyle": "tall",
  "bg": "cream"
}/*EDITMODE-END*/;

const ACCENTS = {
  terracotta: { main: 'oklch(58% 0.13 42)', light: 'oklch(92% 0.05 42)', text: 'oklch(40% 0.1 42)' },
  sage:        { main: 'oklch(58% 0.10 155)', light: 'oklch(93% 0.04 155)', text: 'oklch(38% 0.09 155)' },
  plum:        { main: 'oklch(52% 0.14 310)', light: 'oklch(93% 0.05 310)', text: 'oklch(35% 0.12 310)' },
  ochre:       { main: 'oklch(66% 0.14 75)', light: 'oklch(95% 0.05 75)', text: 'oklch(44% 0.12 75)' },
};
const BGS = {
  cream: { bg: 'oklch(97% 0.012 65)', card: 'oklch(100% 0 0)', sub: 'oklch(94% 0.012 65)', text: 'oklch(18% 0.02 50)', muted: 'oklch(55% 0.015 50)' },
  white: { bg: 'oklch(100% 0 0)', card: 'oklch(98% 0.005 65)', sub: 'oklch(95% 0.005 65)', text: 'oklch(12% 0.01 50)', muted: 'oklch(52% 0.01 50)' },
  dark:  { bg: 'oklch(14% 0.015 50)', card: 'oklch(20% 0.018 50)', sub: 'oklch(22% 0.018 50)', text: 'oklch(95% 0.008 65)', muted: 'oklch(62% 0.01 50)' },
};

const categories = [
  { id: 'all', label: 'All' },
  { id: 'breakfast', label: 'Breakfast' },
  { id: 'lunch', label: 'Lunch' },
  { id: 'dinner', label: 'Dinner' },
  { id: 'desserts', label: 'Desserts' },
  { id: 'drinks', label: 'Drinks' },
];

const recipes = [
  {
    id: 1,
    title: 'Saffron Risotto with Crispy Sage',
    category: 'dinner',
    time: '35 min',
    difficulty: 'Medium',
    rating: 4.8,
    reviews: 214,
    calories: 480,
    chef: 'Marco Rossi',
    tags: ['Italian', 'Comfort'],
    colors: ['oklch(72% 0.12 75)', 'oklch(55% 0.14 50)'],
    accent: 'oklch(85% 0.10 75)',
  },
  {
    id: 2,
    title: 'Miso-Glazed Salmon Bowl',
    category: 'lunch',
    time: '20 min',
    difficulty: 'Easy',
    rating: 4.9,
    reviews: 387,
    calories: 520,
    chef: 'Yuki Tanaka',
    tags: ['Japanese', 'Healthy'],
    colors: ['oklch(62% 0.14 200)', 'oklch(45% 0.12 230)'],
    accent: 'oklch(80% 0.10 200)',
  },
  {
    id: 3,
    title: 'Brown Butter Cardamom French Toast',
    category: 'breakfast',
    time: '25 min',
    difficulty: 'Easy',
    rating: 4.7,
    reviews: 162,
    calories: 390,
    chef: 'Amélie Durant',
    tags: ['French', 'Sweet'],
    colors: ['oklch(70% 0.14 55)', 'oklch(50% 0.12 42)'],
    accent: 'oklch(88% 0.10 55)',
  },
  {
    id: 4,
    title: 'Dark Chocolate Lava Cake',
    category: 'desserts',
    time: '18 min',
    difficulty: 'Medium',
    rating: 4.9,
    reviews: 541,
    calories: 350,
    chef: 'Pierre Leblanc',
    tags: ['French', 'Chocolate'],
    colors: ['oklch(28% 0.04 50)', 'oklch(18% 0.02 50)'],
    accent: 'oklch(55% 0.08 50)',
  },
  {
    id: 5,
    title: 'Grilled Corn Elote Tacos',
    category: 'dinner',
    time: '30 min',
    difficulty: 'Easy',
    rating: 4.6,
    reviews: 298,
    calories: 440,
    chef: 'Sofia Reyes',
    tags: ['Mexican', 'Summer'],
    colors: ['oklch(78% 0.16 85)', 'oklch(60% 0.18 45)'],
    accent: 'oklch(88% 0.14 85)',
  },
];

const quickPickRecipes = [
  { id: 10, title: 'Avocado Toast', time: '10 min', rating: 4.5, category: 'breakfast', colors: ['oklch(68% 0.14 145)', 'oklch(52% 0.12 155)'] },
  { id: 11, title: 'Shakshuka', time: '25 min', rating: 4.8, category: 'breakfast', colors: ['oklch(60% 0.16 38)', 'oklch(44% 0.14 28)'] },
  { id: 12, title: 'Pasta Cacio e Pepe', time: '20 min', rating: 4.9, category: 'dinner', colors: ['oklch(82% 0.08 70)', 'oklch(62% 0.06 55)'] },
  { id: 13, title: 'Thai Basil Stir Fry', time: '15 min', rating: 4.7, category: 'lunch', colors: ['oklch(58% 0.18 140)', 'oklch(44% 0.14 110)'] },
];

function StarIcon() {
  return <svg width="10" height="10" viewBox="0 0 12 12" fill="currentColor"><path d="M6 0l1.5 4.5H12L8.3 7.3l1.4 4.4L6 9l-3.7 2.7 1.4-4.4L0 4.5h4.5z"/></svg>;
}
function SearchIcon() {
  return <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.35-4.35"/></svg>;
}
function TimerIcon() {
  return <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><circle cx="12" cy="13" r="8"/><path d="M12 9v4l2.5 2.5"/><path d="M9 3h6"/></svg>;
}
function HeartIcon({ filled }) {
  return <svg width="16" height="16" viewBox="0 0 24 24" fill={filled ? "currentColor" : "none"} stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>;
}
function ChevronRight() {
  return <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><path d="m9 18 6-6-6-6"/></svg>;
}

function RecipeApp({ tweaks }) {
  const [searchVal, setSearchVal] = React.useState('');
  const [activeCategory, setActiveCategory] = React.useState('all');
  const [featuredIdx, setFeaturedIdx] = React.useState(0);
  const [liked, setLiked] = React.useState({});
  const [searchFocused, setSearchFocused] = React.useState(false);

  const accent = ACCENTS[tweaks.accent] || ACCENTS.terracotta;
  const theme = BGS[tweaks.bg] || BGS.cream;
  const isDark = tweaks.bg === 'dark';

  const filtered = recipes.filter(r =>
    (activeCategory === 'all' || r.category === activeCategory) &&
    (searchVal === '' || r.title.toLowerCase().includes(searchVal.toLowerCase()))
  );
  const featured = filtered[featuredIdx % Math.max(filtered.length, 1)] || recipes[0];

  React.useEffect(() => {
    setFeaturedIdx(0);
  }, [activeCategory, searchVal]);

  const toggleLike = (id, e) => {
    e.stopPropagation();
    setLiked(l => ({...l, [id]: !l[id]}));
  };

  const cardTall = tweaks.cardStyle !== 'compact';

  return (
    <div style={{
      width: '100%', height: '100%',
      background: theme.bg,
      overflowY: 'auto',
      overflowX: 'hidden',
      fontFamily: "'DM Sans', sans-serif",
      color: theme.text,
    }}>
      {/* Header */}
      <div style={{ padding: '16px 20px 0' }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 4 }}>
          <div>
            <p style={{ fontSize: 12, color: theme.muted, fontWeight: 400, letterSpacing: '0.02em', marginBottom: 2 }}>Good evening, Jamie 👋</p>
            <h1 style={{ fontFamily: "'Playfair Display', serif", fontSize: 26, fontWeight: 700, lineHeight: 1.1, color: theme.text }}>
              What's for<br/><span style={{ color: accent.main }}>dinner?</span>
            </h1>
          </div>
          <div style={{
            width: 40, height: 40, borderRadius: '50%',
            background: `linear-gradient(135deg, ${accent.main}, ${accent.text})`,
            display: 'flex', alignItems: 'center', justifyContent: 'center',
            color: 'white', fontWeight: 600, fontSize: 15,
            flexShrink: 0, marginTop: 4,
          }}>J</div>
        </div>
      </div>

      {/* Search */}
      <div style={{ padding: '14px 20px 0' }}>
        <div style={{
          display: 'flex', alignItems: 'center', gap: 10,
          background: searchFocused ? theme.card : theme.sub,
          borderRadius: 14,
          border: `1.5px solid ${searchFocused ? accent.main : 'transparent'}`,
          padding: '10px 14px',
          transition: 'all 0.2s',
          boxShadow: searchFocused ? `0 0 0 4px ${accent.light}` : 'none',
        }}>
          <span style={{ color: theme.muted, flexShrink: 0 }}><SearchIcon /></span>
          <input
            value={searchVal}
            onChange={e => setSearchVal(e.target.value)}
            onFocus={() => setSearchFocused(true)}
            onBlur={() => setSearchFocused(false)}
            placeholder="Search 1,200+ recipes…"
            style={{
              border: 'none', outline: 'none', background: 'transparent',
              fontSize: 14, color: theme.text, width: '100%',
              fontFamily: "'DM Sans', sans-serif",
            }}
          />
          {searchVal && (
            <button onClick={() => setSearchVal('')} style={{ background: 'none', border: 'none', cursor: 'pointer', color: theme.muted, padding: 0, fontSize: 16 }}>✕</button>
          )}
        </div>
      </div>

      {/* Categories */}
      <div style={{ padding: '16px 0 0', overflowX: 'auto' }}>
        <div style={{ display: 'flex', gap: 8, paddingLeft: 20, paddingRight: 20, paddingBottom: 4 }}>
          {categories.map(cat => {
            const isActive = activeCategory === cat.id;
            return (
              <button
                key={cat.id}
                onClick={() => setActiveCategory(cat.id)}
                style={{
                  flexShrink: 0,
                  padding: '7px 14px',
                  borderRadius: 20,
                  border: isActive ? 'none' : `1.5px solid ${isDark ? 'oklch(32% 0.02 50)' : 'oklch(88% 0.01 50)'}`,
                  background: isActive ? accent.main : 'transparent',
                  color: isActive ? 'white' : theme.muted,
                  fontSize: 13,
                  fontWeight: isActive ? 600 : 400,
                  cursor: 'pointer',
                  fontFamily: "'DM Sans', sans-serif",
                  transition: 'all 0.18s',
                  letterSpacing: '0.01em',
                }}
              >
                {cat.label}
              </button>
            );
          })}
        </div>
      </div>

      {/* Featured Section */}
      <div style={{ padding: '20px 20px 0' }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 12 }}>
          <h2 style={{ fontFamily: "'Playfair Display', serif", fontSize: 18, fontWeight: 600, color: theme.text }}>Featured</h2>
          <button style={{ background: 'none', border: 'none', cursor: 'pointer', color: accent.main, fontSize: 12, fontWeight: 500, display: 'flex', alignItems: 'center', gap: 2, fontFamily: "'DM Sans', sans-serif" }}>
            See all <ChevronRight />
          </button>
        </div>

        {/* Featured Card */}
        {featured && (
          <div style={{
            borderRadius: 20,
            overflow: 'hidden',
            background: theme.card,
            boxShadow: isDark ? 'none' : '0 4px 24px rgba(0,0,0,0.08)',
            border: isDark ? `1px solid oklch(28% 0.02 50)` : 'none',
            cursor: 'pointer',
            transition: 'transform 0.2s',
          }}
            onMouseEnter={e => e.currentTarget.style.transform = 'scale(1.01)'}
            onMouseLeave={e => e.currentTarget.style.transform = 'scale(1)'}
          >
            {/* Image placeholder */}
            <div style={{
              height: cardTall ? 200 : 140,
              background: `linear-gradient(145deg, ${featured.colors[0]}, ${featured.colors[1]})`,
              position: 'relative',
              display: 'flex',
              alignItems: 'center',
              justifyContent: 'center',
            }}>
              {/* Decorative food shape */}
              <div style={{
                width: cardTall ? 90 : 70, height: cardTall ? 90 : 70,
                borderRadius: '50%',
                background: featured.accent,
                opacity: 0.35,
                position: 'absolute', right: 30, bottom: -15,
              }} />
              <div style={{
                width: cardTall ? 50 : 40, height: cardTall ? 50 : 40,
                borderRadius: '50%',
                background: featured.accent,
                opacity: 0.25,
                position: 'absolute', left: 40, top: 20,
              }} />
              <span style={{ fontSize: 11, color: 'rgba(255,255,255,0.7)', letterSpacing: '0.06em', fontFamily: 'monospace', textTransform: 'uppercase', zIndex: 1 }}>food photo</span>

              {/* Like button */}
              <button
                onClick={e => toggleLike(featured.id, e)}
                style={{
                  position: 'absolute', top: 12, right: 12,
                  width: 32, height: 32, borderRadius: '50%',
                  background: 'rgba(255,255,255,0.25)',
                  backdropFilter: 'blur(8px)',
                  border: 'none', cursor: 'pointer',
                  display: 'flex', alignItems: 'center', justifyContent: 'center',
                  color: liked[featured.id] ? accent.main : 'white',
                  transition: 'all 0.2s',
                }}
              >
                <HeartIcon filled={liked[featured.id]} />
              </button>

              {/* Tags */}
              <div style={{ position: 'absolute', top: 12, left: 12, display: 'flex', gap: 6 }}>
                {featured.tags.map(tag => (
                  <span key={tag} style={{
                    padding: '3px 8px', borderRadius: 8,
                    background: 'rgba(255,255,255,0.22)',
                    backdropFilter: 'blur(8px)',
                    color: 'white', fontSize: 10, fontWeight: 500,
                    letterSpacing: '0.03em',
                  }}>{tag}</span>
                ))}
              </div>

              {/* Dot nav */}
              {filtered.length > 1 && (
                <div style={{ position: 'absolute', bottom: 10, left: '50%', transform: 'translateX(-50%)', display: 'flex', gap: 5 }}>
                  {filtered.slice(0, Math.min(filtered.length, 5)).map((_, i) => (
                    <div key={i} onClick={() => setFeaturedIdx(i)} style={{
                      width: i === featuredIdx % filtered.length ? 16 : 6,
                      height: 6, borderRadius: 3,
                      background: i === featuredIdx % filtered.length ? 'white' : 'rgba(255,255,255,0.5)',
                      cursor: 'pointer', transition: 'all 0.2s',
                    }} />
                  ))}
                </div>
              )}
            </div>

            {/* Card content */}
            <div style={{ padding: '14px 16px 16px' }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 8 }}>
                <h3 style={{ fontFamily: "'Playfair Display', serif", fontSize: 17, fontWeight: 600, color: theme.text, lineHeight: 1.25, flex: 1, paddingRight: 8 }}>
                  {featured.title}
                </h3>
                <div style={{ display: 'flex', alignItems: 'center', gap: 3, color: accent.main, flexShrink: 0 }}>
                  <StarIcon />
                  <span style={{ fontSize: 13, fontWeight: 600 }}>{featured.rating}</span>
                </div>
              </div>

              <p style={{ fontSize: 11, color: theme.muted, marginBottom: 10, fontWeight: 400 }}>
                by {featured.chef} · {featured.reviews} reviews
              </p>

              <div style={{ display: 'flex', gap: 12, alignItems: 'center' }}>
                <div style={{ display: 'flex', alignItems: 'center', gap: 4, color: theme.muted, fontSize: 12 }}>
                  <TimerIcon /> <span>{featured.time}</span>
                </div>
                <div style={{
                  width: 3, height: 3, borderRadius: '50%',
                  background: isDark ? 'oklch(35% 0.02 50)' : 'oklch(80% 0.01 50)',
                }} />
                <span style={{ fontSize: 12, color: theme.muted }}>{featured.difficulty}</span>
                <div style={{
                  width: 3, height: 3, borderRadius: '50%',
                  background: isDark ? 'oklch(35% 0.02 50)' : 'oklch(80% 0.01 50)',
                }} />
                <span style={{ fontSize: 12, color: theme.muted }}>{featured.calories} kcal</span>

                <div style={{ flex: 1 }} />
                <button style={{
                  background: accent.main,
                  border: 'none', borderRadius: 10, cursor: 'pointer',
                  color: 'white', fontSize: 11, fontWeight: 600,
                  padding: '6px 12px',
                  fontFamily: "'DM Sans', sans-serif",
                  letterSpacing: '0.02em',
                }}>Cook Now</button>
              </div>
            </div>
          </div>
        )}
      </div>

      {/* Quick Picks */}
      <div style={{ padding: '22px 20px 0' }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 12 }}>
          <h2 style={{ fontFamily: "'Playfair Display', serif", fontSize: 18, fontWeight: 600, color: theme.text }}>Quick Picks</h2>
          <button style={{ background: 'none', border: 'none', cursor: 'pointer', color: accent.main, fontSize: 12, fontWeight: 500, display: 'flex', alignItems: 'center', gap: 2, fontFamily: "'DM Sans', sans-serif" }}>
            See all <ChevronRight />
          </button>
        </div>

        <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
          {quickPickRecipes.map(r => (
            <div key={r.id} style={{
              display: 'flex', alignItems: 'center', gap: 12,
              background: theme.card,
              borderRadius: 14,
              padding: '10px 12px',
              border: isDark ? `1px solid oklch(28% 0.02 50)` : 'none',
              boxShadow: isDark ? 'none' : '0 2px 10px rgba(0,0,0,0.05)',
              cursor: 'pointer',
            }}>
              {/* Mini image */}
              <div style={{
                width: 52, height: 52, borderRadius: 10, flexShrink: 0,
                background: `linear-gradient(145deg, ${r.colors[0]}, ${r.colors[1]})`,
                display: 'flex', alignItems: 'center', justifyContent: 'center',
              }}>
                <span style={{ fontSize: 9, color: 'rgba(255,255,255,0.6)', fontFamily: 'monospace', textAlign: 'center', lineHeight: 1.2 }}>photo</span>
              </div>
              <div style={{ flex: 1 }}>
                <p style={{ fontSize: 13, fontWeight: 500, color: theme.text, marginBottom: 4, lineHeight: 1.2 }}>{r.title}</p>
                <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                  <div style={{ display: 'flex', alignItems: 'center', gap: 3, color: theme.muted, fontSize: 11 }}>
                    <TimerIcon /> <span>{r.time}</span>
                  </div>
                  <div style={{ display: 'flex', alignItems: 'center', gap: 3, color: accent.main, fontSize: 11 }}>
                    <StarIcon /> <span style={{ fontWeight: 600 }}>{r.rating}</span>
                  </div>
                </div>
              </div>
              <button
                onClick={e => toggleLike(r.id, e)}
                style={{ background: 'none', border: 'none', cursor: 'pointer', color: liked[r.id] ? accent.main : theme.muted, padding: 4 }}
              >
                <HeartIcon filled={liked[r.id]} />
              </button>
            </div>
          ))}
        </div>
      </div>

      {/* Bottom nav */}
      <div style={{ height: 72 }} />
      <div style={{
        position: 'sticky', bottom: 0, left: 0, right: 0,
        background: isDark
          ? 'oklch(16% 0.015 50)'
          : 'rgba(255,255,255,0.9)',
        backdropFilter: 'blur(16px)',
        borderTop: `1px solid ${isDark ? 'oklch(26% 0.02 50)' : 'oklch(92% 0.01 50)'}`,

}

// Tweaks wiring
(function() {
  const state = Object.assign({}, TWEAK_DEFAULTS);

  function applyTweaks(s) {
    // Re-render with new tweaks by dispatching a custom event
    window.__tweakState = s;
    window.dispatchEvent(new CustomEvent('tweaks-change', { detail: s }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: s }, '*');
  }

  function bindGroup(id, key) {
    document.getElementById(id)?.querySelectorAll('.tweak-opt').forEach(btn => {
      btn.addEventListener('click', () => {
        document.getElementById(id).querySelectorAll('.tweak-opt').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        state[key] = btn.dataset.val;
        applyTweaks({...state});
      });
    });
  }
  bindGroup('tweak-accent', 'accent');
  bindGroup('tweak-card', 'cardStyle');
  bindGroup('tweak-bg', 'bg');

  window.addEventListener('message', e => {
    if (e.data?.type === '__activate_edit_mode') document.getElementById('tweaks-panel').classList.add('visible');
    if (e.data?.type === '__deactivate_edit_mode') document.getElementById('tweaks-panel').classList.remove('visible');
  });
  window.parent.postMessage({ type: '__edit_mode_available' }, '*');
})();
</script>

<!-- React re-render bridge for tweaks -->
<script type="text/babel">
window.addEventListener('tweaks-change', (e) => {
  // Unmount and remount with new tweaks
  const root = document.getElementById('root');
  root.innerHTML = '';
  const newState = e.detail;
  function App2() {
    return (
      <IOSDevice dark={newState.bg === 'dark'}>
        <RecipeApp tweaks={newState} />
      </IOSDevice>
    );
  }
  ReactDOM.createRoot(root).render(<App2 />);
});
</script>
